# Argus local infrastructure foundation
# Postgres 16 + Redis 7. Optional Phase 8 health supervisor worker (profile: workers).
# The FastAPI API continues to run locally with uvicorn (not containerized here).

name: argus

services:
  postgres:
    image: postgres:16
    container_name: argus-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - argus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7
    container_name: argus-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - argus_redis_data:/data
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  health_supervisor:
    build:
      context: .
      dockerfile: workers/Dockerfile
    container_name: argus-health-supervisor
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Inside Compose, talk to service DNS names (host .env URLs use 127.0.0.1).
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      ARGUS_WORKER_INSTANCE_KEY: compose-health-supervisor-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["workers"]

volumes:
  argus_postgres_data:
    name: argus_postgres_data
  argus_redis_data:
    name: argus_redis_data
